<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto2Data | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050810; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .asset-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        .asset-card:hover { background: rgba(14, 165, 233, 0.05); border-color: rgba(14, 165, 233, 0.2); }
    </style>
</head>
<body class="text-white min-h-screen pb-10">
    <div class="max-w-xl mx-auto px-6">
        <header class="flex justify-between items-center py-8">
            <h1 class="text-xl font-extrabold tracking-tight italic">Crypto2<span class="text-sky-400">Data</span></h1>
            <div class="flex gap-3">
                <a href="deposit.html" class="bg-sky-500 p-2 rounded-xl hover:bg-sky-400 transition-all">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </a>
            </div>
        </header>

        <section class="mb-8">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-1">Total Estimated Balance</p>
            <h2 class="text-4xl font-black tracking-tighter">$0.00</h2>
        </section>

        <div class="space-y-3 mb-8">
            <h4 class="text-[10px] font-bold text-gray-600 uppercase tracking-widest ml-1">Your Assets</h4>
            
            <!-- ETH Assets -->
            <div class="asset-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-500/10 rounded-full flex items-center justify-center text-blue-400 font-bold">Ξ</div>
                    <div>
                        <p class="text-sm font-bold">ETH <span class="text-[10px] text-gray-500 font-normal ml-1">Mainnet</span></p>
                    </div>
                </div>
                <p class="text-sm font-mono font-bold">0.00</p>
            </div>

            <div class="asset-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-400/10 rounded-full flex items-center justify-center text-sky-300 font-bold">Ξ</div>
                    <div>
                        <p class="text-sm font-bold">ETH <span class="text-[10px] text-gray-500 font-normal ml-1">Arbitrum</span></p>
                    </div>
                </div>
                <p class="text-sm font-mono font-bold">0.00</p>
            </div>

            <div class="asset-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600/10 rounded-full flex items-center justify-center text-blue-500 font-bold">Ξ</div>
                    <div>
                        <p class="text-sm font-bold">ETH <span class="text-[10px] text-gray-500 font-normal ml-1">Base</span></p>
                    </div>
                </div>
                <p class="text-sm font-mono font-bold">0.00</p>
            </div>

            <!-- Stablecoins -->
            <div class="asset-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500/10 rounded-full flex items-center justify-center text-green-500 font-bold">$</div>
                    <div>
                        <p class="text-sm font-bold">USDT <span class="text-[10px] text-gray-500 font-normal ml-1">Multi-Chain</span></p>
                    </div>
                </div>
                <p class="text-sm font-mono font-bold">0.00</p>
            </div>

            <div class="asset-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-400/10 rounded-full flex items-center justify-center text-blue-400 font-bold">$</div>
                    <div>
                        <p class="text-sm font-bold">USDC <span class="text-[10px] text-gray-500 font-normal ml-1">Multi-Chain</span></p>
                    </div>
                </div>
                <p class="text-sm font-mono font-bold">0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="deposit.html" class="bg-white/5 border border-white/10 text-center py-4 rounded-2xl font-bold text-sm hover:bg-white/10 transition-all">Deposit</a>
            <a href="buy-data.html" class="bg-sky-500 text-center py-4 rounded-2xl font-bold text-sm hover:bg-sky-400 transition-all shadow-lg shadow-sky-500/20">Buy Data</a>
        </div>
    </div>
</body>
</html>
