<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto2Data | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Exact Colors from image_78a433.png */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050810; 
            color: #ffffff;
            margin: 0;
        }

        .glass-nav {
            background: rgba(5, 8, 16, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Asset Card Style from Image */
        .asset-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .asset-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Blue Button from Image_78a433.png */
        .btn-blue {
            background-color: #00A3FF;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(0, 163, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-blue:hover {
            background-color: #0086d1;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .logo-text {
            font-weight: 800;
            font-style: italic;
        }

        .text-muted {
            color: #64748b;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">

            <div class="space-y-3">

                            <i data-lucide="wifi" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">50GB <span class="text-[10px] text-muted ml-2 font-normal">Monthly</span></p>
                            <p class="text-[10px] text-muted uppercase font-bold">4.50 USDT</p>

                    </div>
                    <a href="auth.html" class="text-xs font-bold text-sky-500">Select</a>
                </div>

                <!-- 100GB Bundle -->
                <div class="asset-card p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-sky-500/10 rounded-full flex items-center justify-center text-sky-500">
                            <i data-lucide="zap" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">100GB <span class="text-[10px] text-muted ml-2 font-normal">Monthly</span></p>
                            <p class="text-[10px] text-muted uppercase font-bold">8.50 USDT</p>
                        </div>
                    </div>
                    <a href="auth.html" class="text-xs font-bold text-sky-500">Select</a>
                </div>
            </div>
        </div>

        <!-- Airtel Bundles (Bottom Row / Section) -->
        <div class="mb-12">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-6 h-6 bg-red-600 rounded-full flex items-center justify-center text-[8px] font-black text-white italic">A</div>
                <span class="text-[10px] font-bold text-muted tracking-tighter uppercase">Airtel Nigeria</span>
            </div>
            
            <div class="space-y-3">
                <div class="asset-card p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-sky-500/10 rounded-full flex items-center justify-center text-sky-500">

                        <div>
                            <p class="text-sm font-bold">50GB <span class="text-[10px] text-muted ml-2 font-normal">Monthly</span></p>

                </div>
            </div>
        </div>

        <!-- Call to Action (Matching image_78a433.png buttons) -->
        <div class="grid grid-cols-2 gap-4 mt-8">
            <a href="auth.html" class="btn-outline py-4 rounded-2xl font-bold text-center text-sm transition">
                Learn More
            </a>
            <a href="auth.html" class="btn-blue py-4 rounded-2xl font-bold text-center text-sm transition">
                Buy Data
            </a>
        </div>
    </main>

    <footer class="max-w-xl mx-auto px-6 py-12 text-center">
        <p class="text-[10px] text-muted font-bold tracking-[0.2em]">© 2026 CRYPTO2DATA • NIGERIA</p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
