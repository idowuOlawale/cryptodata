<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto2Data | Buy Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050810; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; }
        .bundle-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid transparent; 
            border-radius: 24px; 
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .bundle-card:hover { border-color: #eab308; background: rgba(234, 179, 8, 0.05); }
        .bundle-card.selected { border-color: #eab308; background: rgba(234, 179, 8, 0.1); transform: scale(1.02); }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen pb-20 p-6">

    <div class="max-w-4xl mx-auto">
        <a href="dashboard.html" class="text-gray-500 hover:text-sky-400 mb-8 inline-block font-bold">← Back</a>
        
        <h2 class="text-3xl font-black mb-10">Select Your Bundle</h2>

        <!-- Network Toggle -->
        <div class="flex gap-4 mb-10">
            <button onclick="switchNetwork('mtn')" id="btn-mtn" class="px-8 py-3 rounded-2xl font-bold bg-yellow-500 text-black border-2 border-yellow-500">MTN</button>
            <button onclick="switchNetwork('airtel')" id="btn-airtel" class="px-8 py-3 rounded-2xl font-bold bg-white/5 border-2 border-white/10 hover:border-red-500 transition-all">Airtel</button>
        </div>

        <!-- Bundle Grid (Based on image_87c1fc.png) -->
        <div id="bundle-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <!-- Cards will be injected here by JavaScript -->
        </div>

        <!-- Phone Input & Purchase -->
        <div class="glass-panel p-8 max-w-md mx-auto">
            <div class="mb-6">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2 block">Recipient Phone Number</label>
                <input type="tel" id="phone" placeholder="0803 000 0000" class="w-full p-4 rounded-2xl outline-none focus:border-sky-500">
            </div>
            <button onclick="processPurchase()" class="w-full bg-sky-500 py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-sky-500/20 hover:bg-sky-400 transition-all">
                Complete Purchase
            </button>
        </div>
    </div>

    <script>
        let selectedNetwork = 'mtn';
        let selectedPrice = 0;

        const bundles = {
            mtn: [
                { size: "50GB", price: 4.50, duration: "30 Days" },
                { size: "100GB", price: 8.50, duration: "30 Days" },
                { size: "200GB", price: 15.50, duration: "6 Months" }
            ],
            airtel: [
                { size: "50GB", price: 4.50, duration: "30 Days" },
                { size: "100GB", price: 8.50, duration: "30 Days" },
                { size: "200GB", price: 15.50, duration: "6 Months" }
            ]
        };

        function renderBundles() {
            const grid = document.getElementById('bundle-grid');
            grid.innerHTML = '';
            
            bundles[selectedNetwork].forEach((b, index) => {
                const card = document.createElement('div');
                card.className = `bundle-card p-8 text-center flex flex-col items-center`;
                card.onclick = () => selectBundle(card, b.price);
                
                // Matches the visual style of image_87c1fc.png
                card.innerHTML = `
                    <div class="w-10 h-10 rounded-full mb-6 flex items-center justify-center font-bold text-[8px] ${selectedNetwork === 'mtn' ? 'bg-yellow-400 text-black' : 'bg-red-600 text-white'}">
                        ${selectedNetwork.toUpperCase()}
                    </div>
                    <h3 class="text-4xl font-black mb-4">${b.size}</h3>
                    <p class="text-xl font-bold ${selectedNetwork === 'mtn' ? 'text-yellow-400' : 'text-red-500'} mb-2">${b.price} USDT</p>
                    <p class="text-gray-500 text-sm font-medium">${b.duration}</p>
                `;
                grid.appendChild(card);
            });
        }

        function switchNetwork(net) {
            selectedNetwork = net;
            document.querySelectorAll('button').forEach(b => b.classList.replace('bg-yellow-500', 'bg-white/5'));
            const activeBtn = document.getElementById(`btn-${net}`);
            activeBtn.className = `px-8 py-3 rounded-2xl font-bold border-2 ${net === 'mtn' ? 'bg-yellow-500 text-black border-yellow-500' : 'bg-red-600 text-white border-red-600'}`;
            renderBundles();
        }

        function selectBundle(element, price) {
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            selectedPrice = price;
        }

        function processPurchase() {
            const phone = document.getElementById('phone').value;
            if (!phone || selectedPrice === 0) return alert("Select a bundle and enter phone number");
            alert(`Processing ${selectedNetwork.toUpperCase()} data for ${phone}. Total: ${selectedPrice} USDT`);
            // Firebase logic would go here
        }

        renderBundles();
    </script>
</body>
</html>
