<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto2Data | Buy Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050810; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; }
        select, input { background: #0f172a !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <a href="dashboard.html" class="text-gray-500 hover:text-sky-400 mb-8 inline-block font-bold text-sm">← Back</a>
        <div class="glass-panel p-8">
            <h2 class="text-2xl font-black mb-6">Top-up Data</h2>
            <form class="space-y-5">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block mb-2">Network</label>
                    <select class="w-full p-4 rounded-2xl outline-none">
                        <option>MTN Nigeria</option>
                        <option>Airtel Nigeria</option>
                        <option>Glo</option>
                        <option>9mobile</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block mb-2">Plan</label>
                    <select class="w-full p-4 rounded-2xl outline-none">
                        <option>500MB - 0.25 USDT</option>
                        <option>1GB - 0.50 USDT</option>
                        <option>5GB - 2.40 USDT</option>
                        <option>10GB - 4.50 USDT</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block mb-2">Phone Number</label>
                    <input type="tel" placeholder="080 000 0000" class="w-full p-4 rounded-2xl outline-none" required>
                </div>
                <button type="submit" class="w-full bg-sky-500 py-4 rounded-2xl font-black text-sm uppercase shadow-lg shadow-sky-500/20">Purchase Now</button>
            </form>
        </div>
    </div>
</body>
</html>
