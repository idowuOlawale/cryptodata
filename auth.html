<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto2Data | Google Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Shared Design System from Image Reference */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050810; 
            color: #ffffff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            backdrop-filter: blur(10px);
        }

        /* Branding Logic */
        .logo-font {
            font-weight: 800;
            font-style: italic;
        }

        /* Login Button Styling */
        .btn-google {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00A3FF;
            transform: translateY(-2px);
        }

        .text-subtle {
            color: #64748b;
        }

        .glow-effect {
            box-shadow: 0 0 40px -10px rgba(0, 163, 255, 0.2);
        }
    </style>
</head>
<body class="p-6">

    <div class="auth-card text-center glow-effect">
        <div class="w-16 h-16 bg-sky-500 rounded-2xl flex items-center justify-center font-black text-white text-3xl mx-auto mb-8 shadow-lg shadow-sky-500/20">C</div>
        
        <h2 class="text-3xl font-extrabold mb-2 tracking-tight">Welcome Back</h2>
        <p class="text-subtle text-sm mb-10 font-medium">Access Nigeria's premier crypto-data portal.</p>
        
        <button id="google-login" class="w-full btn-google flex items-center justify-center gap-4 py-4 px-6 active:scale-95">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Google_Favicon_2025.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original" class="w-6 h-6">
            <span class="text-sm uppercase tracking-widest">Continue with Google</span>
        </button>
        
        <div class="mt-12 flex items-center justify-center gap-4">
            <span class="w-full h-px bg-white/5"></span>
            <div class="flex items-center gap-1.5">
                <i data-lucide="shield-check" class="w-3.5 h-3.5 text-sky-500"></i>
                <span class="text-[10px] font-bold text-subtle uppercase tracking-[0.2em]">Secure</span>
            </div>
            <span class="w-full h-px bg-white/5"></span>
        </div>
    </div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    lucide.createIcons();

    document.getElementById('google-login').addEventListener('click', () => {
        // ✅ Call signInWithPopup IMMEDIATELY — no await before it
        const provider = new GoogleAuthProvider();
        signInWithPopup(auth, provider)
            .then(async (result) => {
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);

                if (!snap.exists()) {
                    await setDoc(userRef, {
                        email: user.email,
                        name: user.displayName,
                        balance: 0,
                        isAdmin: false,
                        photoURL: user.photoURL
                    });
                }
                window.location.href = 'dashboard.html';
            })
            .catch((err) => {
                console.error(err);
                alert("Login failed: " + err.message);
            });
    });
</script>
 
</body>
</html>
