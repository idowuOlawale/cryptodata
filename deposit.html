<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto2Data | Quick Deposit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050810; color: white; }
        .action-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px; 
        }
        select { 
            background: #111827 !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: white !important; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <!-- Simple Top Nav -->
    <div class="w-full max-w-md flex justify-between items-center mb-10">
        <a href="dashboard.html" class="p-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 class="text-sm font-bold tracking-widest uppercase text-gray-500">Deposit USDT / ETH</h1>
        <div class="w-10"></div> 
    </div>

    <div class="w-full max-w-md">
        <!-- Main Interactive Area -->
        <div class="action-card p-8 text-center shadow-2xl">
            
            <!-- Quick Selection -->
            <div class="mb-8 text-left">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-sky-500 mb-3 block">1. Choose Asset & Network</label>
                <select id="network-select" class="w-full p-4 rounded-2xl outline-none focus:border-sky-500 transition-all font-semibold">
                    <option value="USDT">USDC (All EVM Chains)</option>
                    <option value="ETH-ARB">ETH (Arbitrum One)</option>
                    <option value="ETH-BASE">ETH (Base)</option>
                    <option value="ETH-MAIN">ETH (Mainnet)</option>
                    <option value="USDC">USDT (All EVM Chains)</option>
                </select>
            </div>

            <!-- Visual QR -->
            <div class="mb-8 relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-sky-500 to-blue-600 rounded-[40px] blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                <div class="relative bg-white p-5 rounded-[36px] inline-block shadow-xl">
                    <div id="qrcode"></div>
                </div>
                <p class="text-[10px] text-gray-500 mt-4 font-medium uppercase tracking-widest">Scan to pay</p>
            </div>

            <!-- One-Tap Copy -->
            <div class="mb-4">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-600 mb-3 block text-left">2. Copy Address</label>
                <button onclick="copyAddress()" class="w-full bg-black/40 hover:bg-black/60 border border-white/5 p-4 rounded-2xl flex items-center justify-between group transition-all">
                    <span id="wallet-address" class="text-[10px] font-mono text-sky-400 truncate pr-4">0x0a7560F4c49d320cc390aE286a923980E46D0c95</span>
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="text-gray-500 group-hover:text-white transition-colors"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
            </div>

            <p class="text-[9px] text-gray-600 leading-relaxed">
                Tokens are credited automatically after <span class="text-white">2 confirmations</span>.
            </p>
        </div>

        <!-- Warning Toast -->
        <div class="mt-6 p-4 rounded-2xl bg-sky-500/5 border border-sky-500/10 flex gap-4 items-start">
            <div class="text-sky-500">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <p class="text-[10px] text-gray-400 leading-normal">
                <b>Crypto2Data Tip:</b> This address supports multiple chains. Ensure your wallet is on the correct network (Arbitrum, Base, or Mainnet) before sending.
            </p>
        </div>
    </div>

    <script>
        const myAddress = "0x0a7560F4c49d320cc390aE286a923980E46D0c95";
        
        // Instant QR Generation
        new QRCode(document.getElementById("qrcode"), {
            text: myAddress,
            width: 180,
            height: 180,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Copy Logic
        window.copyAddress = () => {
            navigator.clipboard.writeText(myAddress);
            const btnText = document.querySelector('#wallet-address');
            const originalText = btnText.innerText;
            btnText.innerText = "COPIED TO CLIPBOARD!";
            btnText.classList.add('text-white');
            setTimeout(() => {
                btnText.innerText = originalText;
                btnText.classList.remove('text-white');
            }, 2000);
        };
    </script>
</body>
</html>
