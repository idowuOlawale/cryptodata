<html lang="en">

        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .status-success { background: #DCFCE7; color: #166534; }
        .status-pending { background: #FEF9C3; color: #854D0E; }

<body class="min-h-screen">

                </a>
